name: Discord PR Notification

on:
  pull_request:
    types: [opened, closed, review_requested]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: PR 생성 알림
        if: github.event.action == 'opened'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          AUTHOR_NAME: ${{ github.event.pull_request.user.login }}
          AUTHOR_AVATAR: ${{ github.event.pull_request.user.avatar_url }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "PR 생성: $PR_TITLE" \
            --arg url "$PR_URL" \
            --arg author "$AUTHOR_NAME" \
            --arg author_url "https://github.com/$AUTHOR_NAME" \
            --arg avatar "$AUTHOR_AVATAR" \
            --arg branch "$HEAD_REF → $BASE_REF" \
            --arg repo "$REPO" \
            --arg footer "PR #$PR_NUMBER" \
            --argjson color 3066993 \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                author: { name: $author, url: $author_url, icon_url: $avatar },
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Branch", value: $branch, inline: true }
                ],
                footer: { text: $footer }
              }]
            }')
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"

      - name: PR 머지 알림
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          AUTHOR_NAME: ${{ github.event.pull_request.user.login }}
          AUTHOR_AVATAR: ${{ github.event.pull_request.user.avatar_url }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "PR 머지: $PR_TITLE" \
            --arg url "$PR_URL" \
            --arg author "$AUTHOR_NAME" \
            --arg author_url "https://github.com/$AUTHOR_NAME" \
            --arg avatar "$AUTHOR_AVATAR" \
            --arg merged_by "$MERGED_BY" \
            --arg repo "$REPO" \
            --arg footer "PR #$PR_NUMBER" \
            --argjson color 9699539 \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                author: { name: $author, url: $author_url, icon_url: $avatar },
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Merged by", value: $merged_by, inline: true }
                ],
                footer: { text: $footer }
              }]
            }')
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"

      - name: 리뷰 요청 알림
        if: github.event.action == 'review_requested'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          AUTHOR_NAME: ${{ github.event.pull_request.user.login }}
          AUTHOR_AVATAR: ${{ github.event.pull_request.user.avatar_url }}
          REVIEWER: ${{ github.event.requested_reviewer.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "리뷰 요청: $PR_TITLE" \
            --arg url "$PR_URL" \
            --arg author "$AUTHOR_NAME" \
            --arg author_url "https://github.com/$AUTHOR_NAME" \
            --arg avatar "$AUTHOR_AVATAR" \
            --arg reviewer "$REVIEWER" \
            --arg repo "$REPO" \
            --arg footer "PR #$PR_NUMBER" \
            --argjson color 16776960 \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                author: { name: $author, url: $author_url, icon_url: $avatar },
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Reviewer", value: $reviewer, inline: true }
                ],
                footer: { text: $footer }
              }]
            }')
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
