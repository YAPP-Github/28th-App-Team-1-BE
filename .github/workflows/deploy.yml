name: Deploy to Production

on:
  push:
    branches:
      - main
      - issue/5/infra
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY_URL: ${{ secrets.ECR_REPOSITORY_URL }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Test
  # ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

  # ──────────────────────────────────────────────────────────────
  # Job 2: Build Docker image & Push to ECR
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REPOSITORY_URL }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.ECR_REPOSITORY_URL }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # Job 3: Deploy to EC2
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env file on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail
            mkdir -p /opt/d14
            cat > /opt/d14/.env << ENVEOF
            ECR_REPOSITORY_URL=${{ secrets.ECR_REPOSITORY_URL }}
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ENVEOF
            chmod 600 /opt/d14/.env

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/opt/d14/"

      - name: ECR login & restart services on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd /opt/d14

            # EC2 IAM role 의 ECR ReadOnly 권한으로 docker login
            /usr/local/bin/ecr-login.sh

            # 이미지 pull & 컨테이너 재시작
            docker compose pull app
            docker compose up -d --remove-orphans

            # 헬스 체크 (최대 60초 대기)
            timeout 60 sh -c 'until docker compose ps app | grep -q "Up"; do sleep 3; done' \
              || (docker compose logs app && exit 1)

            # 사용하지 않는 이미지 정리
            docker image prune -f

  # ──────────────────────────────────────────────────────────────
  # Job 4: Notify Discord
  # ──────────────────────────────────────────────────────────────
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy]
    if: always()

    steps:
      - name: Determine result
        id: result
        run: |
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "stage=Test" >> "$GITHUB_OUTPUT"
            echo "status=failure" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.build-and-push.result }}" == "failure" ]]; then
            echo "stage=Build/Push" >> "$GITHUB_OUTPUT"
            echo "status=failure" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.deploy.result }}" == "failure" ]]; then
            echo "stage=Deploy" >> "$GITHUB_OUTPUT"
            echo "status=failure" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.test.result }}" == "cancelled" \
               || "${{ needs.build-and-push.result }}" == "cancelled" \
               || "${{ needs.deploy.result }}" == "cancelled" ]]; then
            echo "stage=-" >> "$GITHUB_OUTPUT"
            echo "status=cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "stage=Deploy" >> "$GITHUB_OUTPUT"
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ steps.result.outputs.status }}
          STAGE: ${{ steps.result.outputs.stage }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          [ -z "$FIRST_LINE" ] && FIRST_LINE="(수동 실행)"

          case "$STATUS" in
            success)   COLOR=3066993; TITLE_PREFIX="배포 성공" ;;
            cancelled) COLOR=9807270; TITLE_PREFIX="배포 취소" ;;
            *)         COLOR=15158332; TITLE_PREFIX="배포 실패 (${STAGE})" ;;
          esac

          PAYLOAD=$(jq -n \
            --arg title "${TITLE_PREFIX}: ${FIRST_LINE}" \
            --arg url "$RUN_URL" \
            --arg author "$ACTOR" \
            --arg author_url "https://github.com/$ACTOR" \
            --arg avatar "https://github.com/$ACTOR.png" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg footer "Run #$RUN_NUMBER" \
            --argjson color $COLOR \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                author: { name: $author, url: $author_url, icon_url: $avatar },
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Branch", value: $branch, inline: true }
                ],
                footer: { text: $footer }
              }]
            }')
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
