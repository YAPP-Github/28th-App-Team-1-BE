# 6대 평가 항목별 4점 BARS(행동기준평정척도) 채점 기준
# 용도: AxisReportScorer(AnthropicAxisReportScorerAdapter)의 시스템 프롬프트에 고정 삽입.
#       채점된 axis마다 1~4점 중 하나를 부여할 때 참고하는 행동 앵커.
# 출처: 채점 루브릭 원문(9961535) §4-1, §4-2

scale:
  1: "미흡 - 표면·암기·간접. 한 단계만 물어도 막힘"
  2: "기초 - 본인 경험은 있으나 1차 수준에서 정지"
  3: "우수 - 근거 있는 2~3단계 사고, 트레이드오프 인지"
  4: "탁월 - 근본까지 자력 도달 + 일반화·메타인지·맥락 적응"

axes:
  depth:
    anchors:
      1: "버즈워드·주어흐림, 이유를 묻는 1차 질문에도 막힘"
      2: "행동은 있으나 1차에서 정지"
      3: "근거 2~3단계+수치"
      4: "근본 원인에 스스로 도달 + 상황을 비유·쉬운 설명 가능(P4 던졌을 때 관찰)"
    probe_end_condition: "'왜' 3연속에 새 깊이 없음"

  boundary:
    anchors:
      1: "조건·규모 바꿔도 동일답·허세 추측"
      2: "한계 인정뿐, 추론 안 함"
      3: "조건에 답 적응+합리적 추론"
      4: "엣지·임계수치 자력 제시, 확신/추론 구분 + 확장 임계점을 숫자로 자력 제시"
    probe_end_condition: "추론 시도가 2회 연속 실패하는 지점에서 종료"

  connection:
    anchors:
      1: "기술 안에서만 답변하고 실제 비즈니스/조직 내부 맥락 변화 언급 없음"
      2: "추상적(\"좋아졌어요\"), 미측정"
      3: "구체 지표+측정법"
      4: "2~3차 파급+이해관계자 득실+가치 기반 우선순위"
    probe_end_condition: "So-what 3단계 상향 후"

  tradeoff:
    anchors:
      1: "\"그게 좋아서\", 대안 없음 + '모든 걸 다 했다'·비용 없음 주장"
      2: "대안 알지만 포기한 것 설명 못함"
      3: "2개+ 대안 비교, 포기 항목과 비용 명시"
      4: "맥락의존 선택+반대옹호+약점 인지 + 우선순위 기준이 가치·제약과 연결, 청구된 비용 인지"
    probe_end_condition: "반대옹호(P12)+강제삭감(P22) 2축 반응으로 판별"

  conflict:
    anchors:
      1: "회피 또는 일방적 관철/상대 비난"
      2: "주장은 했으나 상대 못 읽음"
      3: "상대이해+근거설득+상황맞는 모드"
      4: "진짜 이해관계 파악+권한없이 영향+관계보존"
    probe_end_condition: "상대 이해관계+설득수단 2축 확인"

  resilience:
    anchors:
      1: "생각 바꾼 경험 없음·외부탓 + 실패 후 행동 공백"
      2: "방법론만 고침(단일순환)"
      3: "전제 바꾼 사례+학습 접근법 + 실패 직후 구체 대응 행동"
      4: "이중순환+원칙화+능동 학습습관 + 피벗을 데이터로 결정"
    probe_end_condition: "폐기한 신념 1건 + (학습 접근법 또는 피벗 사례) 1건"

# 미경험의 정직한 인정("그건 안 해봤지만, 추론하자면…")은 레드플래그가 아니라
# ②경계·규모의 가점 신호다. 책임전가("그건 그쪽 사정")와 혼동해 감점하지 않는다.
